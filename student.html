<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Dashboard — QuickRebas</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800;900&family=Fraunces:wght@700&display=swap" rel="stylesheet">
<style>
:root{--gold:#E8A04C;--ink:#0F1218;--ink2:#161C26;--white:#fff;--border:rgba(255,255,255,0.08);}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Montserrat',sans-serif;background:var(--ink);color:var(--white);min-height:100vh;}
.layout{display:flex;min-height:100vh;}
.sidebar{width:260px;flex-shrink:0;background:var(--ink2);border-right:1px solid var(--border);display:flex;flex-direction:column;position:fixed;top:0;left:0;bottom:0;z-index:50;overflow-y:auto;}
.sb-top{padding:22px;border-bottom:1px solid var(--border);}
.logo{font-weight:900;font-size:0.92rem;letter-spacing:-0.02em;margin-bottom:16px;}
.logo .q{color:rgba(255,255,255,0.25);}.logo .dot{color:var(--gold);}
.avatar{width:36px;height:36px;border-radius:50%;background:rgba(232,160,76,0.2);border:1.5px solid rgba(232,160,76,0.4);display:flex;align-items:center;justify-content:center;font-weight:800;font-size:0.82rem;color:var(--gold);margin-bottom:7px;}
.user-name{font-size:0.82rem;font-weight:700;margin-bottom:2px;}
.user-book{font-size:0.68rem;color:rgba(255,255,255,0.38);}
.expiry-pill{margin:12px 22px;padding:9px 13px;border-radius:9px;background:rgba(232,160,76,0.08);border:1px solid rgba(232,160,76,0.2);}
.ep-lbl{font-size:0.57rem;letter-spacing:0.18em;color:var(--gold);font-weight:700;}
.ep-val{font-size:0.78rem;font-weight:600;margin-top:2px;}
.ep-bar{height:3px;background:rgba(255,255,255,0.1);border-radius:2px;margin-top:7px;overflow:hidden;}
.ep-fill{height:100%;border-radius:2px;background:var(--gold);}
.sb-nav{padding:10px 12px;flex:1;}
.nav-lbl{font-size:0.57rem;letter-spacing:0.2em;color:rgba(255,255,255,0.24);font-weight:700;padding:0 8px;margin:10px 0 5px;}
.unit-btn{width:100%;padding:8px 9px;border-radius:7px;border:none;background:transparent;color:rgba(255,255,255,0.48);cursor:pointer;font-family:'Montserrat',sans-serif;font-size:0.73rem;font-weight:600;text-align:left;display:flex;align-items:center;gap:8px;transition:all 0.2s;margin-bottom:2px;}
.unit-btn:hover{background:rgba(255,255,255,0.06);color:white;}
.unit-btn.active{background:rgba(232,160,76,0.12);color:var(--gold);}
.u-num{width:21px;height:21px;border-radius:5px;font-size:0.66rem;font-weight:800;display:flex;align-items:center;justify-content:center;flex-shrink:0;background:rgba(255,255,255,0.08);}
.unit-btn.active .u-num{background:rgba(232,160,76,0.2);color:var(--gold);}
.sb-foot{padding:14px 22px;border-top:1px solid var(--border);}
.logout-btn{width:100%;padding:9px;border-radius:7px;border:1px solid rgba(255,255,255,0.1);background:transparent;color:rgba(255,255,255,0.32);font-family:'Montserrat',sans-serif;font-size:0.72rem;font-weight:600;cursor:pointer;}
.main{margin-left:260px;padding:36px 36px 120px;}
.page-hdr{margin-bottom:24px;}
.page-hdr h1{font-family:'Fraunces',serif;font-size:1.9rem;font-weight:700;letter-spacing:-0.02em;margin-bottom:5px;}
.page-hdr .sub{font-size:0.8rem;color:rgba(255,255,255,0.38);}
.unit-sec{display:none;}.unit-sec.active{display:block;}
.unit-hdr{display:flex;align-items:center;gap:12px;margin-bottom:14px;padding-bottom:12px;border-bottom:1px solid var(--border);}
.u-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0;}
.u-ttl{font-size:0.92rem;font-weight:800;}
.u-sub{font-size:0.7rem;color:rgba(255,255,255,0.38);margin-top:2px;}
.u-cnt{margin-left:auto;font-size:0.68rem;color:rgba(255,255,255,0.28);}
.tracks{display:flex;flex-direction:column;gap:6px;}
.track-item{display:flex;align-items:center;gap:12px;padding:11px 14px;border-radius:9px;background:rgba(255,255,255,0.03);border:1px solid var(--border);transition:all 0.2s;cursor:pointer;}
.track-item:hover{background:rgba(255,255,255,0.06);border-color:rgba(255,255,255,0.14);}
.track-item.playing{background:rgba(232,160,76,0.08);border-color:rgba(232,160,76,0.3);}
.track-item.no-audio{opacity:0.4;cursor:default;}
.play-btn{width:34px;height:34px;border-radius:50%;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;background:rgba(255,255,255,0.08);color:white;transition:all 0.2s;font-size:0.85rem;}
.play-btn:hover{background:rgba(232,160,76,0.2);}
.track-item.playing .play-btn{background:var(--gold);color:var(--ink);}
.t-info{flex:1;min-width:0;}
.t-num{font-size:0.6rem;letter-spacing:0.15em;color:rgba(255,255,255,0.28);font-weight:700;margin-bottom:2px;}
.t-name{font-size:0.82rem;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.t-nurl{font-size:0.65rem;color:rgba(255,255,255,0.18);margin-top:2px;}
.t-prog{flex:1;max-width:160px;}
.prog-bar{height:3px;background:rgba(255,255,255,0.1);border-radius:2px;cursor:pointer;}
.prog-fill{height:100%;border-radius:2px;background:var(--gold);width:0%;transition:width 0.1s linear;}
.t-time{font-size:0.62rem;color:rgba(255,255,255,0.28);margin-top:3px;font-family:monospace;}
.player-bar{position:fixed;bottom:0;left:260px;right:0;background:rgba(15,18,24,0.97);backdrop-filter:blur(20px);border-top:1px solid var(--border);padding:12px 26px;display:flex;align-items:center;gap:18px;transform:translateY(100%);transition:transform 0.3s;z-index:40;}
.player-bar.visible{transform:translateY(0);}
.p-now{flex:1;min-width:0;}
.p-num{font-size:0.58rem;letter-spacing:0.15em;color:var(--gold);font-weight:700;}
.p-name{font-size:0.8rem;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.p-ctrl{display:flex;align-items:center;gap:9px;}
.pc{width:36px;height:36px;border-radius:50%;border:none;cursor:pointer;background:rgba(255,255,255,0.1);color:white;font-size:0.9rem;display:flex;align-items:center;justify-content:center;transition:all 0.2s;}
.pc.main{background:var(--gold);color:var(--ink);width:42px;height:42px;}
.p-prog{flex:2;max-width:340px;}
.pp-bar{height:4px;background:rgba(255,255,255,0.1);border-radius:2px;cursor:pointer;margin-bottom:4px;}
.pp-fill{height:100%;border-radius:2px;background:var(--gold);width:0%;transition:width 0.1s linear;}
.pp-t{display:flex;justify-content:space-between;font-size:0.62rem;color:rgba(255,255,255,0.28);font-family:monospace;}
.spd{background:rgba(255,255,255,0.08);border:none;color:rgba(255,255,255,0.5);padding:5px 10px;border-radius:20px;font-family:'Montserrat',sans-serif;font-size:0.68rem;font-weight:700;cursor:pointer;}
.denied{display:none;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;text-align:center;padding:48px;}
.denied.show{display:flex;}
@media(max-width:768px){.sidebar{transform:translateX(-100%);transition:transform 0.3s;}.main{margin-left:0;padding:70px 16px 110px;}.player-bar{left:0;}.t-prog{display:none;}}
</style>
</head>
<body>

<div class="denied" id="denied">
  <div style="font-size:3rem;margin-bottom:18px;">🔒</div>
  <h2 style="font-family:'Fraunces',serif;font-size:1.9rem;margin-bottom:10px;">Access required</h2>
  <p style="color:rgba(255,255,255,0.5);margin-bottom:28px;max-width:340px;line-height:1.6;">Activate your workbook code to listen to the audio tracks.</p>
  <a href="activate.html" style="background:var(--gold);color:var(--ink);padding:15px 38px;border-radius:50px;font-weight:800;text-decoration:none;font-size:0.9rem;">Activate my code</a>
</div>

<div class="layout" id="app" style="display:none;">
  <aside class="sidebar" id="sidebar">
    <div class="sb-top">
      <div class="logo"><span class="q">QUICK</span>REBAS<span class="dot">.</span></div>
      <div class="avatar" id="av">S</div>
      <div class="user-name" id="uName">Student</div>
      <div class="user-book" id="uBook">QuickRebas</div>
    </div>
    <div class="expiry-pill">

      <div class="ep-val" id="expDate">-</div>
      <div class="ep-bar"><div class="ep-fill" id="expFill" style="width:80%"></div></div>
    </div>
    <div class="sb-nav" id="sbNav"></div>
    <div class="sb-foot"><button class="logout-btn" onclick="logout()">Sign out</button></div>
  </aside>

  <main class="main">
    <div class="page-hdr">
      <h1 id="mainTitle">My Audio Tracks</h1>
      <p class="sub" id="mainSub">Loading...</p>
    </div>
    <div id="units"></div>
  </main>
</div>

<div class="player-bar" id="pBar">
  <div class="p-now"><div class="p-num" id="pNum">TRACK 1.1</div><div class="p-name" id="pName">Loading...</div></div>
  <div class="p-ctrl">
    <button class="pc" onclick="skip(-1)">&#9198;</button>
    <button class="pc main" id="mainBtn" onclick="togglePlay()">&#9654;</button>
    <button class="pc" onclick="skip(1)">&#9197;</button>
  </div>
  <div class="p-prog">
    <div class="pp-bar" onclick="seek(event,this)"><div class="pp-fill" id="ppFill"></div></div>
    <div class="pp-t"><span id="pCur">0:00</span><span id="pTot">0:00</span></div>
  </div>
  <button class="spd" onclick="cycleSpeed()" id="spdBtn">1x</button>
</div>

<audio id="aud"></audio>

  var p=new URLSearchParams(location.search),bk=p.get('book'),tr=p.get('track');
  if(!session){if(bk)localStorage.setItem('qr_redirect',location.href);document.getElementById('denied').classList.add('show');return;}
  if(new Date(session.expiry)<new Date()){document.getElementById('denied').innerHTML='<div style="font-size:3rem;margin-bottom:16px">expired</div><h2 style="font-family:Fraunces,serif;margin-bottom:10px">Access expired</h2><p style="color:rgba(255,255,255,0.5)">Buy a new workbook from your teacher.</p>';document.getElementById('denied').classList.add('show');return;}
  try{var r=await fetch(API+'?action=getAudio');var d=await r.json();audioUrls=d.urls||{};}catch(e){audioUrls={};}
  document.getElementById('app').style.display='flex';
  var lv=bk||session.level||'a0';
  book=BOOKS[lv]||BOOKS['a0'];
  document.getElementById('av').textContent=session.name.charAt(0).toUpperCase();
  document.getElementById('uName').textContent=session.name;
  document.getElementById('uBook').textContent=book.name;
  document.getElementById('mainTitle').textContent=book.name;
  var exp=new Date(session.expiry);
  var dl=Math.max(0,Math.ceil((exp-new Date())/86400000));
  document.getElementById('expDate').textContent=exp.toLocaleDateString('en-GB',{day:'numeric',month:'long',year:'numeric'});
  document.getElementById('expFill').style.width=Math.min(100,Math.round(dl/180*100))+'%';
  var tot=book.units.reduce(function(a,u){return a+u.tracks.length;},0);
  var hasUrl=book.units.reduce(function(a,u){return a+u.tracks.filter(function(t){return audioUrls[lv+'-'+t.id];}).length;},0);
  document.getElementById('mainSub').textContent=hasUrl+' of '+tot+' tracks available';
  buildUI(lv);
  if(tr){var parts=tr.split('-'),ui=book.units.findIndex(function(u){return u.num===parseInt(parts[0]);});if(ui>=0){var ti=book.units[ui].tracks.findIndex(function(t){return t.id===tr;});if(ti>=0)setTimeout(function(){playTrack(ui,ti);},600);}}
});

function buildUI(lv){
  var nav=document.getElementById('sbNav'),cnt=document.getElementById('units');
  nav.innerHTML='<div class="nav-lbl">UNITS</div>';cnt.innerHTML='';allTracks=[];
  book.units.forEach(function(unit,ui){
    var btn=document.createElement('button');
    btn.className='unit-btn'+(ui===0?' active':'');
    btn.id='nb-'+ui;
    btn.innerHTML='<span class="u-num" style="background:'+unit.color+'33;color:'+unit.color+';">'+unit.num+'</span>'+unit.title;
    btn.onclick=function(){switchUnit(ui);};
    nav.appendChild(btn);
    var sec=document.createElement('div');
    sec.className='unit-sec'+(ui===0?' active':'');
    sec.id='us-'+ui;
    var hasCnt=unit.tracks.filter(function(t){return audioUrls[lv+'-'+t.id];}).length;
    sec.innerHTML='<div class="unit-hdr"><div class="u-dot" style="background:'+unit.color+'"></div><div><div class="u-ttl">Unit '+unit.num+' - '+unit.title+'</div><div class="u-sub">'+hasCnt+'/'+unit.tracks.length+' tracks available</div></div><span class="u-cnt">'+unit.tracks.length+' tracks</span></div><div class="tracks" id="tl-'+ui+'"></div>';
    cnt.appendChild(sec);
    var tl=sec.querySelector('#tl-'+ui);
    unit.tracks.forEach(function(track,ti){
      var url=audioUrls[lv+'-'+track.id]||'';
      var noAudio=!url;
      var item=document.createElement('div');
      item.className='track-item'+(noAudio?' no-audio':'');
      item.id='ti-'+ui+'-'+ti;
      item.innerHTML='<button class="play-btn" id="pb-'+ui+'-'+ti+'" onclick="playTrack('+ui+','+ti+',event)">'+(noAudio?'&#9654;':'&#9654;')+'</button>'
        +'<div class="t-info"><div class="t-num">TRACK '+track.id+'</div><div class="t-name">'+track.name+'</div>'+(noAudio?'<div class="t-nurl">No audio yet</div>':'')+'</div>'
        +'<div class="t-prog"><div class="prog-bar" onclick="seekTrack(event,this,'+ui+','+ti+')"><div class="prog-fill" id="pf-'+ui+'-'+ti+'"></div></div><div class="t-time" id="tt-'+ui+'-'+ti+'">0:00</div></div>';
      if(!noAudio)item.onclick=function(){playTrack(ui,ti,null);};
      tl.appendChild(item);
      allTracks.push({ui:ui,ti:ti,track:track,url:url});
    });
  });
}

function switchUnit(ui){
  document.querySelectorAll('.unit-sec').forEach(function(s){s.classList.remove('active');});
  document.querySelectorAll('.unit-btn').forEach(function(b){b.classList.remove('active');});
  document.getElementById('us-'+ui).classList.add('active');
  document.getElementById('nb-'+ui).classList.add('active');
  activeUnit=ui;
}

function playTrack(ui,ti,e){
  if(e)e.stopPropagation();
  var at=allTracks.find(function(t){return t.ui===ui&&t.ti===ti;});
  if(!at||!at.url)return;
  document.querySelectorAll('.track-item').forEach(function(el){el.classList.remove('playing');});
  document.querySelectorAll('.play-btn').forEach(function(el){el.innerHTML='&#9654;';});
  var item=document.getElementById('ti-'+ui+'-'+ti);
  if(item)item.classList.add('playing');
  var pb=document.getElementById('pb-'+ui+'-'+ti);
  if(pb)pb.innerHTML='&#9646;&#9646;';
  curIdx=allTracks.findIndex(function(t){return t.ui===ui&&t.ti===ti;});
  document.getElementById('pNum').textContent='TRACK '+at.track.id;
  document.getElementById('pName').textContent=at.track.name;
  document.getElementById('pBar').classList.add('visible');
  document.getElementById('mainBtn').innerHTML='&#9646;&#9646;';

  // Handle YouTube URLs by embedding them
  var url = at.url;
  if(url.includes('youtube.com')||url.includes('youtu.be')){
    // Extract video ID
    var vid = '';
    if(url.includes('youtu.be/')){
      vid = url.split('youtu.be/')[1].split('?')[0];
    } else if(url.includes('v=')){
      vid = url.split('v=')[1].split('&')[0];
    }
    if(vid){
      // Show YouTube embed in player bar
      showYouTubeEmbed(vid, at.track.id, at.track.name);
      return;
    }
  }

  // Direct audio URL (MP3 etc)
  hideYouTubeEmbed();
  aud.src=url; aud.load(); aud.play().catch(function(){}); playing=true;
  if(activeUnit!==ui)switchUnit(ui);
}

function showYouTubeEmbed(vid, trackId, trackName){
  playing=true;
  // Remove existing embed if any
  var old=document.getElementById('ytEmbed');
  if(old)old.remove();

  // Create embed container
  var wrap=document.createElement('div');
  wrap.id='ytEmbed';
  wrap.style.cssText='position:fixed;bottom:70px;right:20px;width:320px;height:180px;'
    +'border-radius:12px;overflow:hidden;box-shadow:0 8px 32px rgba(0,0,0,0.5);'
    +'border:1px solid rgba(255,255,255,0.1);z-index:100;background:#000;';

  var iframe=document.createElement('iframe');
  iframe.src='https://www.youtube.com/embed/'+vid+'?autoplay=1&rel=0&modestbranding=1';
  iframe.style.cssText='width:100%;height:100%;border:none;';
  iframe.allow='autoplay;encrypted-media';
  iframe.allowFullscreen=true;

  var closeBtn=document.createElement('button');
  closeBtn.textContent='✕';
  closeBtn.style.cssText='position:absolute;top:6px;right:8px;background:rgba(0,0,0,0.7);'
    +'border:none;color:white;font-size:14px;cursor:pointer;border-radius:4px;'
    +'padding:2px 7px;z-index:101;';
  closeBtn.onclick=function(){ hideYouTubeEmbed(); };

  wrap.appendChild(iframe);
  wrap.appendChild(closeBtn);
  document.body.appendChild(wrap);
}

function hideYouTubeEmbed(){
  var el=document.getElementById('ytEmbed');
  if(el)el.remove();
  playing=false;
  document.getElementById('mainBtn').innerHTML='&#9654;';
  document.querySelectorAll('.track-item').forEach(function(el){el.classList.remove('playing');});
  document.querySelectorAll('.play-btn').forEach(function(el){el.innerHTML='&#9654;';});
}

function togglePlay(){
  var yt=document.getElementById('ytEmbed');
  if(yt){ hideYouTubeEmbed(); return; }
  if(!aud.src)return;
  if(playing){aud.pause();playing=false;document.getElementById('mainBtn').innerHTML='&#9654;';}
  else{aud.play();playing=true;document.getElementById('mainBtn').innerHTML='&#9646;&#9646;';}
}

function skip(dir){
  var n=curIdx+dir;
  if(n<0||n>=allTracks.length)return;
  var t=allTracks[n];
  if(t.url)playTrack(t.ui,t.ti,null);
  else skip(dir>0?dir+1:dir-1);
}

function cycleSpeed(){spdI=(spdI+1)%speeds.length;aud.playbackRate=speeds[spdI];document.getElementById('spdBtn').textContent=speeds[spdI]+'x';}

function seek(e,bar){var r=bar.getBoundingClientRect(),pct=(e.clientX-r.left)/r.width;if(aud.duration)aud.currentTime=pct*aud.duration;}
function seekTrack(e,bar,ui,ti){e.stopPropagation();seek(e,bar);}

aud.addEventListener('timeupdate',function(){
  var pct=aud.duration?(aud.currentTime/aud.duration*100):0;
  document.getElementById('ppFill').style.width=pct+'%';
  document.getElementById('pCur').textContent=fmt(aud.currentTime);
  if(curIdx>=0){var t=allTracks[curIdx];var pf=document.getElementById('pf-'+t.ui+'-'+t.ti);var tt=document.getElementById('tt-'+t.ui+'-'+t.ti);if(pf)pf.style.width=pct+'%';if(tt)tt.textContent=fmt(aud.currentTime);}
});
aud.addEventListener('loadedmetadata',function(){document.getElementById('pTot').textContent=fmt(aud.duration);});
aud.addEventListener('ended',function(){playing=false;document.getElementById('mainBtn').innerHTML='&#9654;';skip(1);});
aud.addEventListener('play',function(){playing=true;document.getElementById('mainBtn').innerHTML='&#9646;&#9646;';});
aud.addEventListener('pause',function(){playing=false;document.getElementById('mainBtn').innerHTML='&#9654;';});
</script>
</body>
</html>
